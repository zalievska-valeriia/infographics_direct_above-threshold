<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Distribution of Direct Above-Threshold Procurement by CPV</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Roboto', sans-serif;
    background: #18063a;
    min-height: 100vh;
    color: #fff;
  }

  #header {
    background: linear-gradient(135deg, #0f0223 0%, #18063a 60%, #2a0a5e 100%);
    padding: 28px 36px 20px;
    border-bottom: 3px solid #e45266;
  }

  #header h1 {
    font-size: clamp(15px, 2.2vw, 24px);
    font-weight: 900;
    line-height: 1.35;
    color: #fff;
  }

  #header h1 span { color: #e45266; }

  #cards {
    display: flex;
    gap: 12px;
    padding: 20px 36px 0;
    flex-wrap: wrap;
  }

  .card {
    flex: 1 1 150px;
    background: rgba(255,255,255,0.05);
    border-radius: 8px;
    padding: 11px 15px;
  }

  .card-label {
    font-size: 10px;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  .card-value {
    font-size: 15px;
    font-weight: 900;
  }

  #tabs {
    padding: 18px 36px 0;
    display: flex;
    gap: 8px;
  }

  .tab {
    background: rgba(255,255,255,0.07);
    color: rgba(255,255,255,0.5);
    border: 1.5px solid rgba(255,255,255,0.12);
    border-radius: 6px;
    padding: 7px 16px;
    cursor: pointer;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.4px;
    transition: all 0.2s;
  }

  .tab.active {
    background: #e45266;
    color: #fff;
    border-color: #e45266;
  }

  #bars {
    padding: 18px 36px 8px;
  }

  .bar-row {
    margin-bottom: 10px;
    transition: opacity 0.15s;
  }

  .bar-row.faded { opacity: 0.4; }

  .label-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 3px;
  }

  .cpv-code {
    font-size: 9px;
    font-family: monospace;
    font-weight: 700;
    min-width: 96px;
    opacity: 0.85;
  }

  .cpv-name {
    font-size: 11px;
    color: rgba(255,255,255,0.7);
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: all 0.15s;
  }

  .bar-row:hover .cpv-name {
    color: #fff;
    font-weight: 700;
  }

  .pct-val {
    font-size: 13px;
    font-weight: 900;
    min-width: 48px;
    text-align: right;
  }

  .bar-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    padding-left: 104px;
  }

  .bar-track {
    flex: 1;
    height: 17px;
    background: rgba(255,255,255,0.05);
    border-radius: 4px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.45s cubic-bezier(.4,0,.2,1);
  }

  .tooltip {
    display: none;
    background: rgba(0,0,0,0.55);
    border-radius: 5px;
    padding: 3px 10px;
    font-size: 11px;
    color: #fff;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .bar-row:hover .tooltip { display: block; }

  .tooltip-label { color: rgba(255,255,255,0.45); }

  #footer {
    border-top: 1px solid rgba(255,255,255,0.07);
    padding: 16px 36px 24px;
    margin-top: 8px;
  }

  #footer-inner {
    display: flex;
    align-items: center;
    gap: 24px;
    flex-wrap: wrap;
  }

  .footer-note {
    font-size: 10px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.3px;
    flex-shrink: 0;
  }

  #footer-logos {
    flex: 1;
    min-width: 200px;
    display: flex;
    justify-content: flex-end;
  }

  #logos-img {
    max-height: 36px;
    width: auto;
    opacity: 0.85;
    display: block;
  }
</style>
</head>

<div id="header">
  <h1>Distribution of direct above-threshold procurement<br><span>by CPV codes</span></h1>
</div>

  <div class="card" style="border:1px solid #2db22633; border-left:3px solid #2db226;">

  </div>
</div>

</div>

<div id="bars"></div>

<script>
const data = [
  { cpv: "09120000-6", name: "Gas fuels",                                                    lots: 9965,   lotsShare: 3.88,  sum: 179806105402.25, sumShare: 44.76 },
  { cpv: "09320000-8", name: "Steam, hot water and associated products",                     lots: 18856,  lotsShare: 7.33,  sum: 27548391429.99,  sumShare: 6.86  },
  { cpv: "45000000-7", name: "Construction works and current repair",                        lots: 10666,  lotsShare: 4.15,  sum: 71103371596.34,  sumShare: 17.70 },
  { cpv: "09310000-5", name: "Electricity",                                                  lots: 9795,   lotsShare: 3.81,  sum: 9544555707.23,   sumShare: 2.38  },
  { cpv: "65310000-9", name: "Electricity distribution",                                     lots: 12205,  lotsShare: 4.75,  sum: 9439232178.00,   sumShare: 2.35  },
  { cpv: "34710000-7", name: "Helicopters, aeroplanes and other aircraft",                   lots: 1582,   lotsShare: 0.62,  sum: 9302998678.59,   sumShare: 2.32  },
  { cpv: "79710000-4", name: "Security services",                                            lots: 2390,   lotsShare: 0.93,  sum: 4320711954.67,   sumShare: 1.08  },
  { cpv: "65110000-7", name: "Water distribution",                                           lots: 9057,   lotsShare: 3.52,  sum: 2905805544.96,   sumShare: 0.72  },
  { cpv: "50530000-9", name: "Repair and maintenance of machinery",                          lots: 2290,   lotsShare: 0.89,  sum: 2596112607.71,   sumShare: 0.65  },
  { cpv: "44100000-1", name: "Construction materials and related items",                     lots: 2262,   lotsShare: 0.88,  sum: 1812914284.89,   sumShare: 0.45  },
  { cpv: "90430000-0", name: "Sewage services",                                              lots: 6678,   lotsShare: 2.60,  sum: 1792603613.01,   sumShare: 0.45  },
  { cpv: "72260000-5", name: "Software-related services",                                    lots: 2739,   lotsShare: 1.07,  sum: 1576549292.61,   sumShare: 0.39  },
  { cpv: "79110000-8", name: "Legal advisory and representation services",                   lots: 36543,  lotsShare: 14.21, sum: 1038726778.99,   sumShare: 0.26  },
  { cpv: "64210000-1", name: "Telephone and data transmission services",                     lots: 2521,   lotsShare: 0.98,  sum: 1001683322.41,   sumShare: 0.25  },
  { cpv: "Other",      name: "Other",                                                         lots: 129542, lotsShare: 50.39, sum: 77956792398.11,   sumShare: 19.40 },
];

const COLORS = [
  "#e45266","#c0392b","#e67e22","#fcad10","#fcd700",
  "#2db226","#27ae60","#1abc9c","#16a085",
  "#2980b9","#3498db","#7237c0","#8e44ad",
  "#d35400","#7f8c8d"
];

function formatSum(n) {
  if (n >= 1e9) return "UAH " + (n / 1e9).toFixed(2) + " bn";
  if (n >= 1e6) return "UAH " + (n / 1e6).toFixed(1) + " mn";
  return "UAH " + n.toLocaleString("en-US");
}

function formatLots(n) {
  return n.toLocaleString("en-US");
}

let currentView = "sum";

function setView(v) {
  currentView = v;
  document.querySelectorAll(".tab").forEach(t => {
    t.classList.toggle("active", t.dataset.view === v);
  });
  render();
}

function render() {
  const sorted = [...data].sort((a, b) =>
    currentView === "sum" ? b.sumShare - a.sumShare : b.lotsShare - a.lotsShare
  );
  const maxVal = Math.max(...sorted.map(d => currentView === "sum" ? d.sumShare : d.lotsShare));
  const container = document.getElementById("bars");
  container.innerHTML = "";

  sorted.forEach((row) => {
    const val = currentView === "sum" ? row.sumShare : row.lotsShare;
    const isOther = row.cpv === "Other";
    const colorIdx = data.findIndex(d => d.cpv === row.cpv);
    const color = COLORS[colorIdx] || "#888";
    const widthPct = ((val / maxVal) * 100).toFixed(2);

    const barBg = isOther
      ? `repeating-linear-gradient(45deg,${color}55,${color}55 4px,${color}22 4px,${color}22 8px)`
      : `linear-gradient(90deg,${color}ee,${color}55)`;

    const tooltipText = currentView === "sum"
      ? `<span class="tooltip-label">Value: </span><span style="font-weight:700;color:${color}">${formatSum(row.sum)}</span>`
      : `<span class="tooltip-label">Lots: </span><span style="font-weight:700;color:${color}">${formatLots(row.lots)}</span>`;

    const div = document.createElement("div");
    div.className = "bar-row";
    div.innerHTML = `
      <div class="label-row">
        <span class="cpv-code" style="color:${color}">${isOther ? "—" : row.cpv}</span>
        <span class="cpv-name">${row.name}</span>
        <span class="pct-val" style="color:${color}">${val.toFixed(2)}%</span>
      </div>
      <div class="bar-wrap">
        <div class="bar-track">
          <div class="bar-fill" style="width:${widthPct}%;background:${barBg}"></div>
        </div>
        <div class="tooltip">${tooltipText}</div>
      </div>
    `;

    div.addEventListener("mouseenter", () => {
      document.querySelectorAll(".bar-row").forEach(r => {
        if (r !== div) r.classList.add("faded");
      });
    });
    div.addEventListener("mouseleave", () => {
      document.querySelectorAll(".bar-row").forEach(r => r.classList.remove("faded"));
    });

    container.appendChild(div);
  });
}

render();
</script>
