<style>
  body { font-family: sans-serif; background: #fff; color: #111; margin: 0; padding: 0; }
  .wrap { padding: 1.25rem 1rem 1rem; max-width: 800px; margin: 0 auto; }
  h2 { font-size: 16px; font-weight: 500; margin: 0 0 1rem; }
  .toggle-wrap { display: flex; gap: 4px; margin-bottom: 1.25rem; background: #f3f3f3; border-radius: 8px; padding: 4px; width: fit-content; }
  button { padding: 6px 16px; font-size: 13px; cursor: pointer; border-radius: 6px; border: none; transition: all 0.15s; background: transparent; color: #666; }
  .chart-grid { display: flex; gap: 1rem; align-items: center; }
  .chart-wrap { position: relative; flex-shrink: 0; width: 220px; height: 220px; }

  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #555; padding: 4px 0; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .legend-label { flex: 1; line-height: 1.3; }
  .legend-value { font-weight: 500; color: #111; min-width: 60px; text-align: right; font-size: 11px; }
  .footer { margin-top: 12px; padding-top: 12px; border-top: 0.5px solid #ddd; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .disclaimer { font-size: 11px; color: #999; line-height: 1.5; }
  .donors-img { height: 36px; width: auto; display: block; }
  @media (max-width: 520px) {
    .chart-grid { flex-direction: column; align-items: flex-start; }
    .chart-wrap { width: 180px; height: 180px; }
    .legend-item { font-size: 11px; }
    .legend-value { font-size: 10px; min-width: 48px; }
    .footer { flex-direction: column; align-items: flex-start; }
  }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const DATA = [
  { label: 'Procurement Without Electronic System', lots: 3413880, sum: 79179029796 },
  { label: 'Open Tenders',                    lots: 345399,  sum: 670179317138 },
  { label: 'Direct Above-Threshold Procurement',        lots: 257091,  sum: 401746554789.76 },
  { label: 'Request for Proposals',     lots: 310922,  sum: 100982599908 },
  { label: 'Simplified Procurement',                  lots: 53488,   sum: 165788207209 },
  { label: 'Framework Agreement',                      lots: 1277,    sum: 18026658603 },
  { label: 'Organizer-Defined Tendering',    lots: 104,     sum: 553580635 },
];
const COLORS = ['#18063a','#e45266','#7237c0','#2db226','#fcad10','#fcd700','#505050'];
let mode = 'lots';
let chart;

function styleButtons() {
  const a = { background: '#e45266', color: '#fff', fontWeight: '500' };
  const i = { background: 'transparent', color: '#666', fontWeight: '400' };
  Object.assign(document.getElementById('btn-lots').style, mode === 'lots' ? a : i);
  Object.assign(document.getElementById('btn-sum').style, mode === 'sum' ? a : i);
}

function fmtSum(v) {
  if (v >= 1e9) return 'UAH\u00a0' + (v / 1e9).toFixed(1) + '\u00a0bn';
  if (v >= 1e6) return 'UAH\u00a0' + (v / 1e6).toFixed(0) + '\u00a0mn';
  return 'UAH\u00a0' + v.toLocaleString('en-US');
}

function fmtPct(raw, total) {
  const p = raw / total * 100;
  if (p === 0) return '0%';
  if (p >= 0.01) return p.toFixed(2) + '%';
  // find enough decimals to show at least one significant digit
  for (let d = 3; d <= 8; d++) {
    const s = p.toFixed(d);
    if (parseFloat(s) > 0) return s + '%';
  }
  return p.toExponential(2) + '%';
}

function buildLegend(total) {
  const el = document.getElementById('legend');
  el.innerHTML = '';
  const indexed = DATA.map((d, i) => ({ d, i }));
  indexed.sort((a, b) => {
    const rawA = mode === 'lots' ? a.d.lots : a.d.sum;
    const rawB = mode === 'lots' ? b.d.lots : b.d.sum;
    return rawB - rawA;
  });
  indexed.forEach(({ d, i }) => {
    const raw = mode === 'lots' ? d.lots : d.sum;
    const pct = fmtPct(raw, total);
    el.innerHTML += '<div class="legend-item"><div class="legend-dot" style="background:' + COLORS[i] + '"></div><span class="legend-label">' + d.label + '</span><span class="legend-value">' + pct + '</span></div>';
  });
}

function buildChart() {
  const ctx = document.getElementById('pieChart').getContext('2d');
  const values = DATA.map(d => mode === 'lots' ? d.lots : d.sum);
  const total = values.reduce((a, b) => a + b, 0);
  if (chart) chart.destroy();
  chart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: DATA.map(d => d.label),
      datasets: [{ data: values, backgroundColor: COLORS, borderColor: COLORS.map(() => 'rgba(255,255,255,0.15)'), borderWidth: 1.5, hoverOffset: 8 }]
    },
    options: {
      responsive: false, maintainAspectRatio: false, cutout: '52%',
      plugins: {
        legend: { display: false },
        tooltip: {
          position: 'clamped',
          callbacks: { label: function(ctx) {
            const raw = values[ctx.dataIndex];
            const pct = fmtPct(raw, total);
            return ' ' + (mode === 'lots' ? raw.toLocaleString('en-US') + ' lots' : fmtSum(raw)) + ' (' + pct + ')';
          }},
          xAlign: 'center',
          yAlign: 'bottom'
        }
      }
    }
  });
  buildLegend(total);
}

function setMode(m) { mode = m; styleButtons(); buildChart(); }

// Clamp Chart.js tooltip inside viewport
Chart.Tooltip.positioners.clamped = function(items, eventPosition) {
  const pos = Chart.Tooltip.positioners.nearest.call(this, items, eventPosition);
  if (!pos) return false;
  const chart = this.chart;
  const tw = this.width || 160;
  const th = this.height || 40;
  let x = pos.x;
  let y = pos.y - th - 8;
  const rect = chart.canvas.getBoundingClientRect();
  const vw = window.innerWidth;
  const absX = rect.left + x;
  if (absX + tw / 2 > vw) x = vw - rect.left - tw / 2 - 4;
  if (absX - tw / 2 < 0) x = tw / 2 - rect.left + 4;
  if (rect.top + y < 0) y = pos.y + 8;
  return { x, y };
};

styleButtons(); buildChart();
</script>
