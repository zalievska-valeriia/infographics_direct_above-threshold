function gv(o){
  if(mode==='lots') return o.lots;
  return o.sum!=null?o.sum:0;
}
function sumArr(a){return a.reduce(function(s,i){return s+gv(i);},0);}
function pct(v,t){return v/t*100;}
function fmt1(v){return v.toFixed(1)+'%';}
function fmt2(v){return v.toFixed(2)+'%';}
function fmtVal(v){
  if(mode==='lots') return v.toLocaleString('en-US')+' lots';
  if(v>=1e9) return 'UAH '+(v/1e9).toFixed(1)+' bln';
  if(v>=1e6) return 'UAH '+(v/1e6).toFixed(1)+' mln';
  return 'UAH '+v.toLocaleString('en-US');
}

var tip=document.getElementById('tip');
document.addEventListener('mousemove',function(e){
  tip.style.left=(e.clientX+12)+'px';
  tip.style.top=(e.clientY-28)+'px';
});

function drawBars(cid,main,oth,lothDecimal2){
  var filtered=main.filter(function(o){return gv(o)>0;});
  var sorted=filtered.slice().sort(function(a,b){return gv(b)-gv(a);});
  var othVal=mode==='lots'?oth.lots:oth.sum;
  var total=sumArr(filtered)+othVal;
  var maxVal=gv(sorted[0]);
  var html='';
  sorted.forEach(function(item,idx){
    var val=gv(item);
    var p=pct(val,total);
    var barW=maxVal>0?Math.round(val/maxVal*100):0;
    var isUnique=!item.key;
    var color=item.key?SC[item.key]:UNIQUE_COLOR;
    var labelColor=isUnique?'#555':'#ccc';
    var pctColor=isUnique?'#444':SC[item.key];
    html+='<div class="br">';
    html+='<span class="num" style="color:'+(isUnique?'#444':'#666')+'">'+(idx+1)+'</span>';
    html+='<span class="bl" style="color:'+labelColor+'">'+item.n+'</span>';
    html+='<div class="bar-wrap"><div class="bt" data-val="'+val+'">';
    html+='<div class="bf" style="width:'+barW+'%;background:'+color+'"></div>';
    html+='</div></div>';
    html+='<span class="bpct" style="color:'+pctColor+'">'+fmt1(p)+'</span>';
    html+='</div>';
  });
  var othPct=lothDecimal2?fmt2(pct(othVal,total)):fmt1(pct(othVal,total));
  html+='<div class="oth"><div class="othtitle">Other\u00a0—\u00a0'+othPct+'</div></div>';
  var el=document.getElementById(cid);
  el.innerHTML=html;
  el.querySelectorAll('.bt').forEach(function(bt){
    bt.addEventListener('mouseenter',function(){
      tip.innerHTML=fmtVal(parseFloat(bt.getAttribute('data-val')));
      tip.style.display='block';
    });
    bt.addEventListener('mouseleave',function(){tip.style.display='none';});
  });
}

function updateHighlight(){
  var el=document.getElementById('hbox');
  if(mode==='lots'){
    var rTotal=sumArr(R)+Roth.lots;
    var mSum=R.filter(function(i){return i.key;}).reduce(function(s,i){return s+i.lots;},0);
    var p=pct(mSum,rTotal).toFixed(1)+'%';
    el.innerHTML='<b>'+p+'</b> of direct above-threshold procurements by number of lots were previously conducted as negotiated procedures.';
  } else {
    el.innerHTML=
      '<b>39.9%</b> of direct above-threshold procurements by contract value were previously conducted as negotiated procedures.<br>'+
      '<b>70.2%</b> — excluding gas purchases within the Naftogaz group.';
  }
}

function updateButtons(){
  document.getElementById('b-lots').setAttribute('style',mode==='lots'?BON:BOFF);
  document.getElementById('b-sum').setAttribute('style',mode==='sum'?BON:BOFF);
}

function render(){
  drawBars('lbars',L,Loth,true);
  drawBars('rbars',R,Roth,false);
  updateHighlight();
  updateButtons();
}

function sw(m){mode=m;render();}
render();
