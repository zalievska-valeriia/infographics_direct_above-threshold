<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dozorro — Distribution of direct above-threshold procurements by subject</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Roboto', sans-serif;
    background: #f0eef6;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
  }

  .card {
    background: #fff;
    border-radius: 16px;
    max-width: 860px;
    width: 100%;
    overflow: hidden;
    box-shadow: 0 4px 32px rgba(24,6,58,0.10);
  }

  .body { padding: 36px 44px 32px; }

  .title {
    font-size: 20px;
    font-weight: 700;
    color: #18063a;
    margin-bottom: 24px;
    line-height: 1.3;
  }

  /* TOGGLE */
  .toggle-bar {
    display: flex;
    border: 1.5px solid #ddd;
    border-radius: 10px;
    width: fit-content;
    margin-bottom: 36px;
    overflow: hidden;
  }
  .toggle-btn {
    padding: 9px 24px;
    border: none;
    background: transparent;
    color: #505050;
    font-family: 'Roboto', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .toggle-btn + .toggle-btn { border-left: 1.5px solid #ddd; }
  .toggle-btn.active { background: #e45266; color: #fff; font-weight: 700; }

  /* MAIN ROW */
  .main-row {
    display: flex;
    align-items: center;
    gap: 48px;
  }

  /* DONUT */
  .donut-wrap {
    position: relative;
    flex-shrink: 0;
    width: 260px;
    height: 260px;
  }
  .donut-wrap svg {
    width: 260px;
    height: 260px;
    transform: rotate(-90deg);
  }
  .donut-label {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: none;
  }
  .donut-label .center-val {
    font-size: 24px;
    font-weight: 900;
    color: #18063a;
    line-height: 1;
  }
  .donut-label .center-sub {
    font-size: 11px;
    color: #888;
    font-weight: 500;
    margin-top: 4px;
  }

  /* LEGEND */
  .legend {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .legend-item:hover { background: #f5f3fb; }
  .legend-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .legend-label {
    font-size: 14px;
    color: #222;
    flex: 1;
    font-weight: 400;
  }
  .legend-pct {
    font-size: 14px;
    font-weight: 700;
    color: #18063a;
    min-width: 52px;
    text-align: right;
  }

  /* DESKTOP FLOATING POPUP */
  .popup-float {
    position: fixed;
    background: #18063a;
    color: #fff;
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 13px;
    line-height: 1.6;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 1000;
    width: 220px;
    box-shadow: 0 6px 24px rgba(24,6,58,0.25);
  }
  .popup-float.visible { opacity: 1; }

  /* MOBILE INLINE TOOLTIP */
  .popup-inline {
    display: none;
    background: #18063a;
    color: #fff;
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 13px;
    line-height: 1.6;
    margin-top: 16px;
    width: 100%;
  }
  .popup-inline.visible { display: block; }

  /* SHARED POPUP CONTENT STYLES */
  .popup-name {
    font-weight: 700;
    font-size: 14px;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .popup-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .popup-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 8px;
    font-size: 12px;
    color: rgba(255,255,255,0.75);
    margin-top: 3px;
  }
  .popup-row span:first-child { white-space: nowrap; }
  .popup-row span:last-child {
    font-weight: 600;
    color: #fff;
    text-align: right;
    white-space: nowrap;
  }

  /* DIVIDER + FOOTER */
  .divider { height: 1px; background: #ececec; margin: 28px 0 0; }
  .footer {
    background: #fff;
    padding: 14px 44px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .footer-source { font-size: 12px; color: #999; font-weight: 400; white-space: nowrap; }
  .footer-logo {
    height: 24px;
    width: auto;
    display: block;
    mix-blend-mode: multiply;
    opacity: 0.85;
    flex-shrink: 0;
  }

  .donut-segment { cursor: pointer; transition: opacity 0.18s; }
  .donut-segment.dimmed { opacity: 0.25; }

  /* ── MOBILE ── */
  @media (max-width: 600px) {
    body { padding: 0; align-items: flex-start; background: #fff; }
    .card { border-radius: 0; box-shadow: none; }
    .body { padding: 20px 16px 16px; }

    .title { font-size: 16px; margin-bottom: 16px; }

    .toggle-bar { width: 100%; margin-bottom: 24px; }
    .toggle-btn { flex: 1; padding: 9px 8px; font-size: 13px; text-align: center; }

    .main-row { flex-direction: column; align-items: center; gap: 20px; }

    .donut-wrap { width: 190px; height: 190px; }
    .donut-wrap svg { width: 190px; height: 190px; }
    .donut-label .center-val { font-size: 19px; }

    .legend { width: 100%; gap: 0; }
    .legend-item {
      padding: 10px 4px;
      border-bottom: 1px solid #f0f0f0;
      border-radius: 0;
    }
    .legend-item:last-child { border-bottom: none; }

    /* hide desktop popup on mobile */
    .popup-float { display: none !important; }
    /* show inline popup on mobile */
    .popup-inline { display: none; }
    .popup-inline.visible { display: block; }

    .divider { margin: 16px 0 0; }
    .footer { padding: 12px 16px; flex-wrap: wrap; gap: 12px; }
    .footer-source { font-size: 11px; }
    .footer-logo { height: 20px; }
  }
</style>
</head>
<body>

  <div class="body">
    <div class="title">Distribution of direct above-threshold procurements <span style="white-space:nowrap">by subject</span></div>

    <div class="toggle-bar">

      <button class="toggle-btn" onclick="setMetric('sum')">Contract value</button>

  </div>

<!-- Desktop floating popup -->
<div class="popup-float" id="popupFloat">
  <div class="popup-name"><div class="popup-dot" id="flt-dot"></div><span id="flt-title"></span></div>
  <div class="popup-row"><span>Share</span><span id="flt-pct"></span></div>
  <div class="popup-row"><span id="flt-label1"></span><span id="flt-val1"></span></div>
  <div class="popup-row"><span id="flt-label2"></span><span id="flt-val2"></span></div>
</div>

<script>
const COLORS = ['#e45266','#2db226','#7237c0'];
const LABELS = ['Goods','Services','Works'];

const popupData = {
  lots: [
    { pct:'40.15%', label1:'Number of lots', val1:'103,229', label2:'Contract value', val2:'UAH 254.8 bn' },
    { pct:'57.47%', label1:'Number of lots', val1:'147,752', label2:'Contract value', val2:'UAH 79.2 bn' },
    { pct:'2.38%',  label1:'Number of lots', val1:'6,110', label2:'Contract value', val2:'UAH 67.8 bn' }
  ],
  sum: [
    { pct:'63.42%', label1:'Contract value', val1:'UAH 254.8 bn', label2:'Number of lots', val2:'103,229' },
    { pct:'19.70%', label1:'Contract value', val1:'UAH 79.2 bn', label2:'Number of lots', val2:'147,752' },
    { pct:'16.88%', label1:'Contract value', val1:'UAH 67.8 bn', label2:'Number of lots', val2:'6,110' }
  ]
};

const metaData = {
  lots: { pcts:['40.15%','57.47%','2.38%'], donutPcts:[40.15,57.47,2.38], center:'257,091', centerSub:'lots total' },
  sum:  { pcts:['63.42%','19.70%','16.88%'], donutPcts:[63.42,19.70,16.88], center:'UAH 401.7 bn', centerSub:'total' }
};

let currentMetric = 'lots';
let activeInlineIdx = null;

function isMobile() { return window.innerWidth <= 600; }

function setMetric(m) {
  currentMetric = m;
  document.querySelectorAll('.toggle-btn').forEach((b,i) => {
    b.classList.toggle('active', ['lots','sum'][i] === m);
  });
  const d = metaData[m];
  for (let i = 0; i < 3; i++) {
    document.getElementById('leg-pct-'+i).textContent = d.pcts[i];
  }
  document.getElementById('donutCenter').textContent = d.center;
  document.getElementById('donutCenterSub').textContent = d.centerSub;
  drawDonut(d.donutPcts);
  // refresh open inline popup if any
  if (activeInlineIdx !== null) fillPopup(activeInlineIdx);
}

function fillPopup(idx) {
  const d = popupData[currentMetric][idx];
  ['flt','inl'].forEach(p => {
    document.getElementById(p+'-dot').style.background = COLORS[idx];
    document.getElementById(p+'-title').textContent = LABELS[idx];
    document.getElementById(p+'-pct').textContent = d.pct;
    document.getElementById(p+'-label1').textContent = d.label1;
    document.getElementById(p+'-val1').textContent = d.val1;
    document.getElementById(p+'-label2').textContent = d.label2;
    document.getElementById(p+'-val2').textContent = d.val2;
  });
}

// Desktop: hover on legend items
function initLegendHover() {
  document.querySelectorAll('.legend-item').forEach((item, i) => {
    item.addEventListener('mouseenter', (e) => {
      if (isMobile()) return;
      fillPopup(i);
      document.getElementById('popupFloat').classList.add('visible');
      moveFloat(e);
    });
    item.addEventListener('mousemove', (e) => {
      if (!isMobile()) moveFloat(e);
    });
    item.addEventListener('mouseleave', () => {
      if (!isMobile()) document.getElementById('popupFloat').classList.remove('visible');
    });
  });
}

function onLegendClick(idx) {
  if (!isMobile()) return;
  const inl = document.getElementById('popupInline');
  if (activeInlineIdx === idx) {
    activeInlineIdx = null;
    inl.classList.remove('visible');
  } else {
    activeInlineIdx = idx;
    fillPopup(idx);
    inl.classList.add('visible');
  }
}

function moveFloat(e) {
  const el = document.getElementById('popupFloat');
  const pw = el.offsetWidth || 220;
  const ph = el.offsetHeight || 100;
  let x = e.clientX + 14;
  let y = e.clientY - ph / 2;
  if (x + pw > window.innerWidth - 8) x = e.clientX - pw - 14;
  if (y < 8) y = 8;
  if (y + ph > window.innerHeight - 8) y = window.innerHeight - ph - 8;
  el.style.left = x + 'px';
  el.style.top = y + 'px';
}

function drawDonut(pcts) {
  const svg = document.getElementById('donutSvg');
  svg.innerHTML = '';
  const cx = 50, cy = 50, r = 40;
  let start = 0;
  pcts.forEach((p, i) => {
    const angle = (p / 100) * 360;
    const seg = document.createElementNS('http://www.w3.org/2000/svg','path');
    seg.setAttribute('d', describeArc(cx, cy, r, start, start + angle));
    seg.setAttribute('fill','none');
    seg.setAttribute('stroke', COLORS[i]);
    seg.setAttribute('stroke-width', '18');
    seg.setAttribute('stroke-linecap','butt');
    seg.classList.add('donut-segment');
    seg.addEventListener('mouseenter', (e) => {
      if (isMobile()) return;
      fillPopup(i);
      document.getElementById('popupFloat').classList.add('visible');
      moveFloat(e);
    });
    seg.addEventListener('mousemove', (e) => { if (!isMobile()) moveFloat(e); });
    seg.addEventListener('mouseleave', () => { if (!isMobile()) document.getElementById('popupFloat').classList.remove('visible'); });
    seg.addEventListener('click', () => { if (isMobile()) onLegendClick(i); });
    svg.appendChild(seg);
    start += angle;
  });
}

function polarToCartesian(cx, cy, r, deg) {
  const rad = deg * Math.PI / 180;
  return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
}
function describeArc(cx, cy, r, s, e) {
  const sp = polarToCartesian(cx, cy, r, s);
  const ep = polarToCartesian(cx, cy, r, e);
  return 'M '+sp.x+' '+sp.y+' A '+r+' '+r+' 0 '+(e-s>180?1:0)+' 1 '+ep.x+' '+ep.y;
}

document.addEventListener('DOMContentLoaded', () => {
  initLegendHover();
  drawDonut([40.15, 57.47, 2.38]);
});
</script>
