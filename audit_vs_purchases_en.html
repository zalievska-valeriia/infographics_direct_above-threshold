let metric = 'sum';

function getSharedLabels(auditData, realData) {
  const auditSet = new Set(auditData.map(d => d.label));
  const realSet  = new Set(realData.map(d => d.label));
  const shared = new Set();
  auditSet.forEach(l => { if (realSet.has(l)) shared.add(l); });
  return shared;
}

function fmtSum(v) {
  if (v >= 1e9) return 'UAH ' + (v / 1e9).toFixed(1) + ' bln';
  if (v >= 1e6) return 'UAH ' + (v / 1e6).toFixed(0) + ' mln';
  return 'UAH ' + Math.round(v).toLocaleString('en-US');
}

function renderCol(id, data, shared, m) {
  const maxVal = m === 'sum' ? Math.max(...data.map(d => d.sum)) : Math.max(...data.map(d => d.qty));
  document.getElementById(id).innerHTML = data.map((d, i) => {
    const isShared  = shared.has(d.label);
    const barColor  = isShared ? (SHARED_COLORS[d.label] || '#fff') : NEUTRAL_COLOR;
    const textColor = isShared ? SHARED_TEXT : NEUTRAL_TEXT;
    const valColor  = isShared ? (SHARED_COLORS[d.label] || '#fff') : 'rgba(255,255,255,0.3)';
    const raw = m === 'sum' ? d.sum : d.qty;
    const pct = (raw / maxVal * 100).toFixed(1);
    const valStr = m === 'sum' ? fmtSum(d.sum) : d.qty.toLocaleString('en-US');
    return `<div class="bar-row">
      <div class="bar-meta">
        <div class="bar-label" style="color:${textColor};">
          <span class="bar-cat-dot" style="background:${barColor};"></span>
          <span>${i + 1}. ${d.label}</span>
        </div>
        <div class="bar-value" style="color:${valColor};">${valStr}</div>
      </div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${pct}%; background:${barColor};"></div>
      </div>
    </div>`;
  }).join('');
}

function render() {
  const aData  = metric === 'sum' ? auditBySum : auditByQty;
  const rData  = metric === 'sum' ? realBySum  : realByQty;
  const shared = getSharedLabels(aData, rData);
  renderCol('audit-chart', aData, shared, metric);
  renderCol('real-chart',  rData, shared, metric);
}

function setMetric(m) {
  metric = m;
  document.querySelectorAll('.mtab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && m === 'sum') || (i === 1 && m === 'qty'));
  });
  render();
}
