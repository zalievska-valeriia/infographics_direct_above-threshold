<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dozorro — Неконкурентні закупівлі</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #e45266;
    --dark-purple: #18063a;
    --purple: #2a055b;
    --green: #2db226;
    --white: #ffffff;
    --light-bg: #f7f5fb;
    --mid-purple: #7237c0;
    --orange: #fcad10;
    --yellow: #fcd700;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Roboto', sans-serif;
    background: var(--dark-purple);
    color: var(--white);
    min-height: 100vh;
    padding: 32px 24px 60px;
  }

  .main-title {
    font-size: clamp(20px, 3vw, 26px);
    font-weight: 900;
    line-height: 1.2;
    margin-bottom: 28px;
    color: var(--white);
  }

  .toggle-wrap {
    display: flex;
    gap: 8px;
    margin-bottom: 36px;
  }

  .toggle-btn {
    padding: 10px 22px;
    border-radius: 100px;
    border: 1.5px solid rgba(255,255,255,0.15);
    background: transparent;
    color: rgba(255,255,255,0.5);
    font-family: 'Roboto', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.25s;
    letter-spacing: 0.03em;
  }

  .toggle-btn.active {
    background: var(--pink);
    border-color: var(--pink);
    color: var(--white);
    box-shadow: 0 4px 20px rgba(228,82,102,0.4);
  }

  .toggle-btn:hover:not(.active) {
    border-color: rgba(255,255,255,0.4);
    color: var(--white);
  }

  .layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    align-items: start;
  }

  @media (max-width: 820px) {
    body { padding: 20px 16px 48px; }
    .layout { grid-template-columns: 1fr; }
    .chart-square { max-width: 280px; margin: 0 auto; }
    .toggle-wrap { flex-wrap: wrap; }
    .toggle-btn { font-size: 12px; padding: 8px 16px; }
    .stats-row { gap: 10px; }
    .stat-card { padding: 12px 14px; }
    .legend { max-height: none; }
    .main-title { font-size: 18px; }
  }

  .chart-wrap {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .chart-square {
    position: relative;
    width: 100%;
    max-width: 380px;
    aspect-ratio: 1 / 1;
    flex-shrink: 0;
  }

  canvas#pieChart {
    position: absolute;
    top: 0;
    left: 0;
    width: 100% !important;
    height: 100% !important;
  }

  .chart-center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: none;
  }
  .chart-center-value {
    font-size: clamp(18px, 3vw, 30px);
    font-weight: 900;
    color: var(--white);
    line-height: 1;
  }
  .chart-center-label {
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .legend {
    display: flex;
    flex-direction: column;
    gap: 7px;
    max-height: 460px;
    overflow-y: auto;
    padding-right: 4px;
  }

  .legend::-webkit-scrollbar { width: 4px; }
  .legend::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 4px; }
  .legend::-webkit-scrollbar-thumb { background: var(--pink); border-radius: 4px; }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: 10px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .legend-item:hover, .legend-item.hovered {
    background: rgba(255,255,255,0.09);
    border-color: rgba(255,255,255,0.18);
    transform: translateX(4px);
  }

  .legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  .legend-text {
    flex: 1;
    min-width: 0;
  }

  .legend-name {
    font-size: 11.5px;
    font-weight: 500;
    color: rgba(255,255,255,0.85);
    white-space: normal;
    word-break: break-word;
    line-height: 1.35;
  }

  .legend-pct {
    font-size: 15px;
    font-weight: 900;
    color: var(--white);
    flex-shrink: 0;
  }

  .legend-bar {
    position: absolute;
    left: 0;
    top: 0;
    height: 100%;
    opacity: 0.07;
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
  }

  .stats-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 16px 18px;
  }

  .stat-card-label {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 6px;
  }

  .stat-card-value {
    font-size: clamp(18px, 2.5vw, 24px);
    font-weight: 900;
    color: var(--pink);
  }

  .stat-card-value.green { color: var(--green); }

  .tooltip {
    position: fixed;
    background: var(--dark-purple);
    border: 1px solid rgba(228,82,102,0.4);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 12px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 999;
    max-width: 220px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }

  .tooltip.visible { opacity: 1; }
  .tooltip-name { font-weight: 700; color: var(--white); margin-bottom: 4px; line-height: 1.3; }
  .tooltip-val { color: rgba(255,255,255,0.6); font-size: 11px; }
  .tooltip-pct { color: var(--pink); font-weight: 900; font-size: 16px; }

  .footer-wrap {
    margin-top: 48px;
    border-top: 1px solid rgba(255,255,255,0.08);
    padding-top: 20px;
  }
  .footer {
    border-top: 1px solid rgba(255,255,255,0.1);
    padding-top: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .footer-text { font-size: 11px; color: rgba(255,255,255,0.35); line-height: 1.6; }
  .footer img { height: 44px; object-fit: contain; }

</style>
</head>
<body>

<div class="main-title" id="mainTitle">Distribution of above-threshold direct procurement by grounds</div>

<div class="stats-row">
  <div class="stat-card">
    <div class="stat-card-label" id="labelLots">Total lots</div>
    <div class="stat-card-value" id="totalLots">257,091</div>
  </div>
  <div class="stat-card">
    <div class="stat-card-label" id="labelSum">Total amount</div>
    <div class="stat-card-value green" id="totalSum">UAH 401.7 bn</div>
  </div>
</div>

<div class="toggle-wrap">
  <button class="toggle-btn active" id="btnSum" onclick="setMode('sum')">By contract value</button>
  <button class="toggle-btn" id="btnLots" onclick="setMode('lots')">By number of lots</button>
</div>

<div class="layout">
  <div class="chart-wrap">
    <div class="chart-square">
      <canvas id="pieChart"></canvas>
      <div class="chart-center" id="chartCenter">
        <div class="chart-center-value" id="centerVal">UAH 401.7 bn</div>
        <div class="chart-center-label" id="centerLbl">UAH contracts</div>
      </div>
    </div>
  </div>
  <div class="legend" id="legend"></div>
</div>

<div class="tooltip" id="tooltip">
  <div class="tooltip-name" id="tt-name"></div>
  <div class="tooltip-pct" id="tt-pct"></div>
  <div class="tooltip-val" id="tt-val"></div>
</div>

<div class="footer">
    <div class="footer-text">Data for 2024/07/30–2025/09/30 from Prozorro and BI Prozorro</div>

    return 'UAH ' + v.toLocaleString('en');
  }
  if (v >= 1e9) return (v / 1e9).toFixed(1) + ' млрд';
  if (v >= 1e6) return (v / 1e6).toFixed(0) + ' млн';
  return v.toLocaleString('uk');
}

function formatSumFull(v) {
  if (lang === 'en') return 'UAH ' + v.toLocaleString('en', {maximumFractionDigits: 0});
  return v.toLocaleString('uk', {maximumFractionDigits: 0}) + ' грн';
}

function getTotal() {
  return mode === 'sum' ? totalSum() : totalLots();
}

function getDisplayData() {
  const sorted = [...raw].sort((a, b) =>
    mode === 'sum' ? b.sum - a.sum : b.lots - a.lots
  );
  const top10 = sorted.slice(0, 10);
  const rest = sorted.slice(10);
  const otherLots = rest.reduce((s, d) => s + d.lots, 0);
  const otherSum = rest.reduce((s, d) => s + d.sum, 0);
  const display = [...top10];
  if (rest.length > 0) {
    display.push({ name: 'Other', lots: otherLots, sum: otherSum, isOther: true });
  }
  return display;
}

function updateCenter(idx) {
  const cv = document.getElementById('centerVal');
  const cl = document.getElementById('centerLbl');
  if (idx >= 0) {
    const data = getDisplayData();
    const d = data[idx];
    const val = mode === 'sum' ? d.sum : d.lots;
    const total = getTotal();
    cv.textContent = mode === 'sum' ? formatSum(val) : val.toLocaleString('en');
    cl.textContent = (Math.round(Math.round((val / total) * 10000) / 10) / 10).toFixed(1) + '%';
  } else {
    const t = getTotal();
    cv.textContent = mode === 'sum' ? formatSum(t) : t.toLocaleString('en');
    cl.textContent = mode === 'sum' ? 'UAH contracts' : 'lots';
  }
}

function buildLegend() {
  const legend = document.getElementById('legend');
  const total = getTotal();
  const data = getDisplayData();

  legend.innerHTML = '';
  data.forEach((d, i) => {
    const val = mode === 'sum' ? d.sum : d.lots;
    const pct = (Math.round(Math.round((val / total) * 10000) / 10) / 10).toFixed(1);
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.dataset.idx = i;

    const bar = document.createElement('div');
    bar.className = 'legend-bar';
    bar.style.background = getColor(d.name);
    bar.style.width = pct + '%';

    item.innerHTML = `
      <div class="legend-dot" style="background:${getColor(d.name)}"></div>
      <div class="legend-text">
        <div class="legend-name" title="${d.name}">${d.name}</div>
      </div>
      <div class="legend-pct">${pct}%</div>
    `;
    item.prepend(bar);

    item.addEventListener('mouseenter', () => {
      hoveredIndex = i;
      highlightSegment(i);
      updateCenter(i);
      showLegendHover(item);
    });
    item.addEventListener('mouseleave', () => {
      hoveredIndex = -1;
      resetHighlight();
      updateCenter(-1);
      removeLegendHover();
    });
    legend.appendChild(item);
  });
}


function showLegendHover(el) {
  document.querySelectorAll('.legend-item').forEach(li => li.classList.remove('hovered'));
  el.classList.add('hovered');
}
function removeLegendHover() {
  document.querySelectorAll('.legend-item').forEach(li => li.classList.remove('hovered'));
}

function highlightSegment(idx) {
  if (!chart) return;
  const data = getDisplayData();
  chart.data.datasets[0].offset = data.map((_, i) => i === idx ? 18 : 0);
  chart.data.datasets[0].borderWidth = data.map((_, i) => i === idx ? 2 : 0);
  chart.update('none');
}

function resetHighlight() {
  if (!chart) return;
  const data = getDisplayData();
  chart.data.datasets[0].offset = new Array(data.length).fill(0);
  chart.data.datasets[0].borderWidth = 0;
  chart.update('none');
}

function buildChart() {
  const ctx = document.getElementById('pieChart').getContext('2d');
  const data = getDisplayData();
  const values = data.map(d => mode === 'sum' ? d.sum : d.lots);

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: data.map(d => d.name),
      datasets: [{
        data: values,
        backgroundColor: data.map(d => getColor(d.name)),
        borderColor: '#18063a',
        borderWidth: 2,
        hoverOffset: 16,
        offset: new Array(data.length).fill(0),
      }]
    },
    options: {
      cutout: '62%',
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 600, easing: 'easeInOutQuart' },
      plugins: {
        legend: { display: false },
        tooltip: {
          enabled: false,
          external: function(context) {
            const tt = document.getElementById('tooltip');
            if (context.tooltip.opacity === 0) {
              tt.classList.remove('visible');
              return;
            }
            const idx = context.tooltip.dataPoints?.[0]?.dataIndex;
            if (idx === undefined) return;

            const d = getDisplayData()[idx];
            const val = mode === 'sum' ? d.sum : d.lots;
            const total = getTotal();
            const pct = (Math.round(Math.round((val / total) * 10000) / 10) / 10).toFixed(1);

            document.getElementById('tt-name').textContent = d.name;
            document.getElementById('tt-pct').textContent = pct + '%';
            document.getElementById('tt-val').textContent = mode === 'sum'
              ? `${formatSumFull(d.sum)} · ${d.lots.toLocaleString('en')} lots`
              : `${d.lots.toLocaleString('en')} lots · ${formatSum(d.sum)}`;

            const pos = context.chart.canvas.getBoundingClientRect();
            tt.classList.add('visible');

            // Position tooltip, keeping it within viewport
            const ttW = tt.offsetWidth || 220;
            const ttH = tt.offsetHeight || 80;
            const vw = window.innerWidth;
            const vh = window.innerHeight;

            let x = pos.left + context.tooltip.caretX + 16;
            let y = pos.top + context.tooltip.caretY - 20;

            // Prevent right overflow
            if (x + ttW > vw - 8) x = pos.left + context.tooltip.caretX - ttW - 16;
            // Prevent left overflow
            if (x < 8) x = 8;
            // Prevent bottom overflow
            if (y + ttH > vh - 8) y = vh - ttH - 8;
            // Prevent top overflow
            if (y < 8) y = 8;

            tt.style.left = x + 'px';
            tt.style.top = y + 'px';

            updateCenter(idx);
          }
        }
      },
      onHover: (event, elements) => {
        if (!elements.length) {
          updateCenter(-1);
        }
      }
    }
  });
}


function setMode(m) {
  mode = m;
  document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  buildChart();
  buildLegend();
  updateCenter(-1);
}

buildChart();
buildLegend();
updateCenter(-1);
</script>
</body>
</html>
